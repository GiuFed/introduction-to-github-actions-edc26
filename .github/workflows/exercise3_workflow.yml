env :
    MyVariable: 'This is my variable'
name: Exercise 3 workflow
run-name: Third workflow # Optional 
# Events triggering the workflow
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:
# Group of jobs to run as part of the workflow
jobs:
    job_myvariable:
        runs-on: ubuntu-latest
        steps:
            - run: echo "$MyVariable "
            - run: echo "$secrets.GITHUB_TOKEN"
    job_github_token:
        runs-on: ubuntu-latest
        steps:
            - run: echo "$secrets.GITHUB_TOKEN"